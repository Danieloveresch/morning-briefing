name: Build Morning Briefing

on:
  schedule:
    # Mehrere Laeufe zu "krummen" Minuten (weniger Warteschlange).
    # Faengt verspaetete/uebersprungene Laeufe ab -> morgens zuverlaessig frisch.
    # Zeiten in UTC; im Sommer (CEST) +2h, im Winter (CET) +1h.
    - cron: '29 2 * * *'    # ~04:29 / 03:29 Berlin
    - cron: '29 3 * * *'    # ~05:29 / 04:29 Berlin
    - cron: '29 4 * * *'    # ~06:29 / 05:29 Berlin
    - cron: '29 5 * * *'    # ~07:29 / 06:29 Berlin
  workflow_dispatch:          # manueller Start per Knopf

permissions:
  contents: write

concurrency:
  group: briefing-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Briefing erzeugen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python briefing.py

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seite verschluesseln (StatiCrypt)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
          STATICRYPT_SALT: ${{ secrets.STATICRYPT_SALT }}
        run: |
          npx --yes staticrypt index.html \
            --password "$STATICRYPT_PASSWORD" \
            --salt "$STATICRYPT_SALT" \
            --remember 30 \
            --config false
          cp encrypted/index.html index.html

      - name: Seite veroeffentlichen
        run: |
          git config user.name "briefing-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.json
          git commit -m "Briefing aktualisiert" || echo "Keine Aenderungen"
          git push
