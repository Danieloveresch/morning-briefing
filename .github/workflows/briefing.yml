name: Build Morning Briefing

on:
  schedule:
    # GitHub plant in UTC und verzögert geplante Jobs oft 15–60 Min, am stärksten
    # zur vollen Stunde. Daher: früh, off-hour, mehrfach gestaffelt. Der frischeste
    # Lauf, der vor 06:30 Berlin fertig wird, gewinnt (jeder Lauf überschreibt).
    - cron: '23 1 * * *'    # 01:23 UTC → 03:23 Sommer / 02:23 Winter
    - cron: '23 2 * * *'    # 02:23 UTC → 04:23 Sommer / 03:23 Winter
    - cron: '23 3 * * *'    # 03:23 UTC → 05:23 Sommer / 04:23 Winter  (frischester)
  workflow_dispatch:           # erlaubt manuellen Start per Knopf

permissions:
  contents: write              # darf die fertige Seite zurueckschreiben

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo holen
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Briefing erzeugen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python briefing.py

      - name: Seite veroeffentlichen
        run: |
          git config user.name "briefing-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.json
          git commit -m "Briefing aktualisiert" || echo "Keine Aenderungen"
          git push
